<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Campeonato Petz 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            color: #333;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }

        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .user-info {
            text-align: right;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .dashboard-link {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
            cursor: pointer;
            display: inline-block;
        }

        .dashboard-link:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-grid.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border-left: 3px solid #28a745;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 3px solid #f5c6cb;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .users-table thead {
            background: #f8f9fa;
        }

        .users-table th,
        .users-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .users-table th {
            font-weight: 600;
            color: #667eea;
        }

        .users-table tr:hover {
            background: #f8f9fa;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.admin {
            background: #667eea;
            color: white;
        }

        .badge.active {
            background: #28a745;
            color: white;
        }

        .badge.inactive {
            background: #dc3545;
            color: white;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .actions button {
            padding: 6px 12px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .edit-btn {
            background: #3498db;
            color: white;
        }

        .edit-btn:hover {
            background: #2980b9;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .close-modal {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .close-modal:hover {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="header">
            <div>
                <h1>⚽ Painel de Administração</h1>
                <p>Campeonato Petz 2026</p>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <div id="userName">Carregando...</div>
                    <div style="font-size: 12px; opacity: 0.9; margin-top: 5px;">Admin</div>
                </div>
                <a href="/" class="dashboard-link">← Voltar ao Dashboard</a>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">📋 Criar Novo Usuário</h2>

            <div class="message" id="createMessage"></div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="newUsername">Usuário *</label>
                    <input type="text" id="newUsername" placeholder="username" required>
                </div>
                <div class="form-group">
                    <label for="newEmail">Email</label>
                    <input type="email" id="newEmail" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label for="newName">Nome Completo</label>
                    <input type="text" id="newName" placeholder="Nome da pessoa">
                </div>
                <div class="form-group">
                    <label for="newPassword">Senha *</label>
                    <input type="password" id="newPassword" placeholder="Senha forte" required>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" onclick="createUser()">Criar Usuário</button>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">👥 Gerenciar Usuários</h2>

            <div class="loading" id="usersLoading">
                <div class="spinner"></div>
                <p>Carregando usuários...</p>
            </div>

            <table class="users-table" id="usersTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Usuário</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Permissão</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="usersBody">
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal de Editar Usuário -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeEditModal()">&times;</span>
            <h3 class="modal-title">Editar Usuário</h3>

            <div class="message" id="editMessage"></div>

            <div class="form-group">
                <label for="editEmail">Email</label>
                <input type="email" id="editEmail" placeholder="email@example.com">
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label for="editName">Nome Completo</label>
                <input type="text" id="editName" placeholder="Nome da pessoa">
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label for="editPassword">Nova Senha (deixe vazio para não alterar)</label>
                <input type="password" id="editPassword" placeholder="Deixe vazio para não alterar">
            </div>

            <div class="button-group" style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="saveEditUser()">Salvar</button>
                <button class="btn btn-secondary" onclick="closeEditModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let currentEditUserId = null;

        // Verificar autenticação ao carregar
        window.addEventListener('load', () => {
            checkAuth();
            loadUsers();
        });

        async function checkAuth() {
            try {
                const response = await fetch('/api/me');
                const data = await response.json();

                if (!data.user) {
                    window.location.href = '/login.html';
                    return;
                }

                if (!data.user.é_admin) {
                    alert('Acesso negado. Apenas administradores podem acessar esta página.');
                    window.location.href = '/';
                    return;
                }

                document.getElementById('userName').textContent = data.user.nome_completo || data.user.username;
            } catch (error) {
                console.error('Erro ao verificar autenticação:', error);
                window.location.href = '/login.html';
            }
        }

        async function loadUsers() {
            try {
                const response = await fetch('/api/usuarios');
                const data = await response.json();

                const tbody = document.getElementById('usersBody');
                tbody.innerHTML = '';

                data.usuarios.forEach(user => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${user.username}</strong></td>
                        <td>${user.nome_completo || '-'}</td>
                        <td>${user.email || '-'}</td>
                        <td>
                            <span class="badge ${user.ativo ? 'active' : 'inactive'}">
                                ${user.ativo ? 'Ativo' : 'Inativo'}
                            </span>
                        </td>
                        <td>
                            ${user.é_admin ? '<span class="badge admin">Admin</span>' : 'Usuário'}
                        </td>
                        <td>
                            <div class="actions">
                                <button class="edit-btn" onclick="editUser(${user.id})">Editar</button>
                                ${user.username !== 'master' ? `<button class="delete-btn" onclick="deleteUser(${user.id})">Deletar</button>` : ''}
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                document.getElementById('usersLoading').style.display = 'none';
                document.getElementById('usersTable').style.display = 'table';
            } catch (error) {
                console.error('Erro ao carregar usuários:', error);
                showMessage('editMessage', 'Erro ao carregar usuários', 'error');
            }
        }

        async function createUser() {
            const username = document.getElementById('newUsername').value.trim();
            const email = document.getElementById('newEmail').value.trim();
            const nome = document.getElementById('newName').value.trim();
            const password = document.getElementById('newPassword').value;

            if (!username || !password) {
                showMessage('createMessage', 'Preencha username e senha', 'error');
                return;
            }

            try {
                const response = await fetch('/api/usuarios', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        email: email || null,
                        nome_completo: nome || null,
                        password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('createMessage', `✅ Usuário ${username} criado com sucesso!`, 'success');
                    document.getElementById('newUsername').value = '';
                    document.getElementById('newEmail').value = '';
                    document.getElementById('newName').value = '';
                    document.getElementById('newPassword').value = '';
                    loadUsers();
                } else {
                    showMessage('createMessage', data.error || 'Erro ao criar usuário', 'error');
                }
            } catch (error) {
                console.error('Erro:', error);
                showMessage('createMessage', 'Erro de conexão', 'error');
            }
        }

        function editUser(userId) {
            currentEditUserId = userId;
            // Implementar busca de dados do usuário
            document.getElementById('editModal').classList.add('show');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            currentEditUserId = null;
        }

        async function saveEditUser() {
            if (!currentEditUserId) return;

            const email = document.getElementById('editEmail').value.trim();
            const nome = document.getElementById('editName').value.trim();
            const password = document.getElementById('editPassword').value;

            try {
                const response = await fetch(`/api/usuarios/${currentEditUserId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email || null,
                        nome_completo: nome || null,
                        password: password || null
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('editMessage', 'Usuário atualizado com sucesso!', 'success');
                    setTimeout(() => closeEditModal(), 1000);
                    loadUsers();
                } else {
                    showMessage('editMessage', data.error || 'Erro ao atualizar', 'error');
                }
            } catch (error) {
                console.error('Erro:', error);
                showMessage('editMessage', 'Erro de conexão', 'error');
            }
        }

        async function deleteUser(userId) {
            if (!confirm('Tem certeza que deseja deletar este usuário?')) return;

            try {
                const response = await fetch(`/api/usuarios/${userId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadUsers();
                } else {
                    const data = await response.json();
                    alert(data.error || 'Erro ao deletar usuário');
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao deletar usuário');
            }
        }

        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                localStorage.removeItem('user');
                window.location.href = '/login.html';
            } catch (error) {
                console.error('Erro ao fazer logout:', error);
            }
        }

        function showMessage(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = `message show ${type}`;

            if (type === 'success') {
                setTimeout(() => {
                    element.classList.remove('show');
                }, 3000);
            }
        }
    </script>
</body>
</html>
